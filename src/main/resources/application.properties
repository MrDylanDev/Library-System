# === CONFIGURACIÓN COMPARTIDA / DESARROLLO (default) ===

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Préstamo
prestamo.dias=15
prestamo.multa.monto=10.00

# JWT
jwt.secret=${JWT_SECRET:LibroMagico2024SecretKeyParaFirmarJWTMinimo256Bits!!}
jwt.expiration=86400000

# Spring JPA
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

# Base de datos H2 (default — para desarrollo)
spring.datasource.url=jdbc:h2:mem:libromagico
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — SQL verbose para debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email — MailHog local
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
