# Configuración del préstamo
prestamo.dias=15
prestamo.multa.monto=10.00

# Base de datos (H2 para desarrollo)
spring.datasource.url=jdbc:h2:mem:libromagico
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=LibroMagico2024SecretKeyParaFirmarJWTMinimo256Bits!!
jwt.expiration=86400000

# Desactivar schema.sql (usamos ddl-auto=update con H2)
spring.sql.init.mode=never

# Email (desarrollo: solo loguea, produccion: configurar SMTP real)
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false