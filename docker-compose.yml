version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libromagico-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/libromagico
      SPRING_DATASOURCE_USERNAME: libromagico
      SPRING_DATASOURCE_PASSWORD: libromagico
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-DevSecretKeyParaFirmarJWTMinimo256BitsCambiameEnProduccion!!}
      APP_MAIL_ENABLED: "true"
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      APP_BASE_URL: http://localhost:8080
    volumes:
      - ./src:/app/src
      - maven-repo:/root/.m2
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: libromagico-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: libromagico
      POSTGRES_USER: libromagico
      POSTGRES_PASSWORD: libromagico
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libromagico -d libromagico"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: libromagico-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  maven-repo:
